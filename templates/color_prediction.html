<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Prediction Pro - Novabetx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { bgDark: '#0a0a0f', panelBg: 'rgba(15, 15, 25, 0.7)', brand: '#1CDA3A', cpGreen: '#22c55e', cpRed: '#ef4444', cpViolet: '#a855f7' } } } }
    </script>
    <style>
        body { font-family: 'Inter', 'Arial', sans-serif; overscroll-behavior: none; }
        .game-bg { background-color: #0a0a0f; background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0a0a0f 100%); }
        .slot-box { overflow: hidden; height: 120px; position: relative; }
        .slot-numbers { display: flex; flex-direction: column; transition: transform 3s cubic-bezier(0.1, 0.8, 0.2, 1); }
        .slot-num { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: 900; }
        @keyframes flashGreen { 0%, 100% { background-color: #0a0a0f; } 50% { background-color: rgba(34, 197, 94, 0.2); } }
        @keyframes flashRed { 0%, 100% { background-color: #0a0a0f; } 50% { background-color: rgba(239, 68, 68, 0.2); } }
        @keyframes flashViolet { 0%, 100% { background-color: #0a0a0f; } 50% { background-color: rgba(168, 85, 247, 0.2); } }
        .win-bg-Green { animation: flashGreen 1s ease infinite; }
        .win-bg-Red { animation: flashRed 1s ease infinite; }
        .win-bg-Violet { animation: flashViolet 1s ease infinite; }
        .glass-panel { background: var(--panelBg); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 32px 0 rgba(0,0,0,0.5); }
        .bet-amount-btn { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #ccc; border-radius: 8px; padding: 8px 0; font-size: 14px; font-weight: bold; transition: all 0.2s; }
        .bet-amount-btn:active { background: rgba(28,218,58,0.2); border-color: #1CDA3A; color: #fff; transform: scale(0.95); }
        .number-btn { transition: all 0.2s; }
        .number-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-bgDark text-white min-h-[100dvh] flex flex-col pb-16 transition-colors duration-300" id="body-wrapper" onclick="initAudio()">

    <div id="toast-container"></div>

    <div class="flex justify-between items-center bg-[#050508] px-4 py-3 border-b border-gray-800 shadow-md relative z-50">
        <div class="bg-purple-500/20 text-purple-400 px-3 py-1 rounded-full text-xs font-black tracking-widest border border-purple-500/30 flex items-center gap-2">
            <i class="fa-solid fa-palette"></i> PARITY
        </div>
        <div class="text-right">
            <div class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Total Balance</div>
            <div class="font-black text-brand text-sm inline-block transition-transform duration-300" id="balance-wrapper">₹<span id="display-balance">{{ "%.2f"|format(user.balance + user.bonus_balance) }}</span></div>
        </div>
    </div>

    <div id="history-strip" class="bg-[#0a0a0f] flex items-center px-3 py-2.5 gap-2 overflow-x-auto whitespace-nowrap text-xs font-black border-b border-gray-800 shadow-inner relative z-50"></div>

    <div class="relative w-full h-[220px] md:h-[300px] game-bg border-b border-gray-800 flex flex-col items-center justify-center shadow-[inset_0_-20px_50px_rgba(0,0,0,0.9)] z-10">
        <div class="absolute top-4 flex flex-col items-center">
            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1" id="status-label">Place Your Bets</div>
            <div id="timer-text" class="text-3xl font-black text-brand drop-shadow-[0_0_10px_rgba(28,218,58,0.8)]">00:30</div>
        </div>
        <div class="mt-8 bg-black border-4 border-gray-700 rounded-2xl w-32 h-[130px] flex items-center justify-center shadow-[0_0_30px_rgba(0,0,0,0.8)] relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-b from-black/50 via-transparent to-black/50 z-20 pointer-events-none"></div>
            <div class="slot-box w-full" id="slot-window">
                <div class="slot-numbers text-gray-700" id="slot-reel"><div class="slot-num">?</div></div>
            </div>
        </div>
        <div id="winner-color-text" class="absolute bottom-4 text-2xl font-black tracking-widest uppercase opacity-0 transition-opacity">GREEN WINS</div>
    </div>

    <div class="flex-1 bg-bgDark p-3 overflow-y-auto flex flex-col z-50 relative">
        <div class="glass-panel rounded-2xl p-5 max-w-md mx-auto w-full">
            <div class="flex items-center bg-black/60 border border-gray-700 rounded-xl px-2 py-2 mb-5 shadow-inner">
                <button onclick="adjustStake(-50)" class="text-gray-400 hover:text-white font-black px-4 text-xl transition-colors">-</button>
                <input type="number" id="stake-amount" value="50" class="w-full bg-transparent text-center text-white font-black text-2xl focus:outline-none">
                <button onclick="adjustStake(50)" class="text-gray-400 hover:text-white font-black px-4 text-xl transition-colors">+</button>
            </div>
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button onclick="setStake(50)" class="bet-amount-btn">50</button><button onclick="setStake(100)" class="bet-amount-btn">100</button><button onclick="setStake(500)" class="bet-amount-btn">500</button>
            </div>
            <div class="grid grid-cols-3 gap-3 mb-6">
                <button id="btn-Green" onclick="placeBet('Green')" class="betting-btn bg-gradient-to-b from-green-500 to-green-700 border-2 border-green-400 rounded-xl py-3 flex flex-col items-center justify-center shadow-[0_0_15px_rgba(34,197,94,0.3)] hover:border-green-300 transition-all">
                    <span class="font-black text-sm tracking-wider">GREEN</span><span class="text-[9px] font-bold bg-black/30 px-2 py-0.5 rounded text-green-100 mt-1">1:2</span>
                </button>
                <button id="btn-Violet" onclick="placeBet('Violet')" class="betting-btn bg-gradient-to-b from-purple-500 to-purple-700 border-2 border-purple-400 rounded-xl py-3 flex flex-col items-center justify-center shadow-[0_0_15px_rgba(168,85,247,0.3)] hover:border-purple-300 transition-all">
                    <span class="font-black text-sm tracking-wider">VIOLET</span><span class="text-[9px] font-bold bg-black/30 px-2 py-0.5 rounded text-purple-100 mt-1">1:4.5</span>
                </button>
                <button id="btn-Red" onclick="placeBet('Red')" class="betting-btn bg-gradient-to-b from-red-500 to-red-700 border-2 border-red-400 rounded-xl py-3 flex flex-col items-center justify-center shadow-[0_0_15px_rgba(239,68,68,0.3)] hover:border-red-300 transition-all">
                    <span class="font-black text-sm tracking-wider">RED</span><span class="text-[9px] font-bold bg-black/30 px-2 py-0.5 rounded text-red-100 mt-1">1:2</span>
                </button>
            </div>
            <div class="bg-black/30 border border-gray-800 rounded-xl p-3 mb-2 text-center relative">
                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-3">Or Bet on Exact Number (Pays 9x)</div>
                <div class="grid grid-cols-5 gap-2">
                    <button onclick="placeBet('0')" class="betting-btn number-btn h-10 rounded text-white font-black text-lg bg-gradient-to-r from-red-500 to-purple-500 shadow-md">0</button>
                    <button onclick="placeBet('1')" class="betting-btn number-btn h-10 rounded text-white font-black text-lg bg-green-600 shadow-md">1</button>
                    <button onclick="placeBet('2')" class="betting-btn number-btn h-10 rounded text-white font-black text-lg bg-red-600 shadow-md">2</button>
                    <button onclick="placeBet('3')" class="betting-btn number-btn h-10 rounded text-white font-black text-lg bg-green-600 shadow-md">3</button>
                    <button onclick="placeBet('4')" class="betting-btn number-btn h-10 rounded text-white font-black text-lg bg-red-600 shadow-md">4</button>
                    <button onclick="placeBet('5')" class="betting-btn number-btn h-10 rounded text-white font-black text-lg bg-gradient-to-r from-green-500 to-purple-500 shadow-md">5</button>
                    <button onclick="placeBet('6')" class="betting-btn number-btn h-10 rounded text-white font-black text-lg bg-red-600 shadow-md">6</button>
                    <button onclick="placeBet('7')" class="betting-btn number-btn h-10 rounded text-white font-black text-lg bg-green-600 shadow-md">7</button>
                    <button onclick="placeBet('8')" class="betting-btn number-btn h-10 rounded text-white font-black text-lg bg-red-600 shadow-md">8</button>
                    <button onclick="placeBet('9')" class="betting-btn number-btn h-10 rounded text-white font-black text-lg bg-green-600 shadow-md">9</button>
                </div>
            </div>
            <div id="my-bet-info" class="hidden mt-4 text-center text-sm font-bold text-gray-300 bg-black/50 py-2 rounded border border-gray-700">
                Bet: ₹<span id="my-bet-amt" class="text-white">0</span> on <span id="my-bet-target" class="text-brand">Target</span>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-[#0a0a0f]/95 backdrop-blur-md border-t border-gray-800 z-[100] py-2.5 px-6 flex justify-between items-center shadow-[0_-4px_20px_rgba(0,0,0,0.8)] md:hidden">
        <a href="{{ url_for('home') }}" class="flex flex-col items-center text-gray-500 hover:text-white transition-transform"><i class="fa-solid fa-house text-xl mb-1"></i><span class="text-[10px] font-bold">Home</span></a>
        <a href="{{ url_for('games') }}" class="flex flex-col items-center text-brand transition-transform"><i class="fa-solid fa-gamepad text-xl mb-1 drop-shadow-[0_0_8px_rgba(28,218,58,0.5)]"></i><span class="text-[10px] font-bold">Games</span></a>
        <a href="{{ url_for('my_bets') }}" class="flex flex-col items-center text-gray-500 hover:text-white transition-transform"><i class="fa-solid fa-file-lines text-xl mb-1"></i><span class="text-[10px] font-bold">My Bets</span></a>
        <a href="{{ url_for('profile') }}" class="flex flex-col items-center text-gray-500 hover:text-white transition-transform"><i class="fa-solid fa-user text-xl mb-1"></i><span class="text-[10px] font-bold">Profile</span></a>
    </nav>

    <script>
        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) { container = document.createElement('div'); container.id = 'toast-container'; container.className = 'fixed top-4 left-1/2 -translate-x-1/2 z-[10000] flex flex-col gap-3 pointer-events-none w-[90%] max-w-sm'; document.body.appendChild(container); }
            const toast = document.createElement('div'); const isSuccess = type === 'success';
            toast.className = `flex items-center gap-3 p-4 rounded-xl border backdrop-blur-md shadow-[0_10px_40px_rgba(0,0,0,0.5)] transition-all duration-300 -translate-y-full opacity-0 ${isSuccess ? 'bg-[#1a2e1d] border-green-500/50' : 'bg-[#2e1a1a] border-red-500/50'}`;
            toast.innerHTML = `<div class="${isSuccess ? 'text-green-500' : 'text-red-500'} text-2xl drop-shadow-[0_0_8px_currentColor]"><i class="fa-solid ${isSuccess ? 'fa-circle-check' : 'fa-circle-exclamation'}"></i></div><div class="flex-1"><h4 class="text-white font-bold text-sm tracking-wider uppercase">${isSuccess ? 'Success' : 'Error'}</h4><p class="text-gray-300 text-xs mt-0.5">${message}</p></div>`;
            container.appendChild(toast);
            requestAnimationFrame(() => { toast.classList.remove('-translate-y-full', 'opacity-0'); toast.classList.add('translate-y-0', 'opacity-100'); });
            setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('-translate-y-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // ==========================================
        // UPGRADED JS SYNTHESIZER AUDIO ENGINE
        // ==========================================
        let audioCtx;
        function initAudio() { if(!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } if(audioCtx.state === 'suspended') audioCtx.resume(); }
        const Sound = {
            play: (f, t, dur, v=0.1) => {
                if(!audioCtx) return;
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
                o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
            },
            tick: () => Sound.play(800, 'sine', 0.05, 0.05),
            win: () => { 
                setTimeout(()=>Sound.play(523.25,'sine',0.1,0.1),0); 
                setTimeout(()=>Sound.play(659.25,'sine',0.1,0.1),100); 
                setTimeout(()=>Sound.play(783.99,'sine',0.1,0.1),200); 
                setTimeout(()=>Sound.play(1046.50,'sine',0.4,0.15),300); 
            },
            lose: () => { 
                setTimeout(()=>Sound.play(200,'sawtooth',0.3,0.05),0); 
                setTimeout(()=>Sound.play(150,'sawtooth',0.4,0.05),300); 
                setTimeout(()=>Sound.play(100,'sawtooth',0.6,0.05),700); 
            }
        };

        function triggerWinAnimation(winnings, newTotal) {
            Sound.win(); // PLAYS ONLY ONCE
            const balWrapper = document.getElementById('balance-wrapper'); const balEl = document.getElementById('display-balance');
            if(!balEl || !balWrapper) return;
            const floater = document.createElement('div');
            floater.className = 'fixed z-[10000] font-black text-brand text-2xl drop-shadow-[0_0_15px_rgba(28,218,58,1)] pointer-events-none transition-all duration-[1500ms] ease-out';
            floater.innerText = '+₹' + parseFloat(winnings).toFixed(2);
            const rect = balWrapper.getBoundingClientRect();
            floater.style.left = (rect.left - 40) + 'px'; floater.style.top = rect.top + 'px';
            floater.style.transform = 'translateY(10px) scale(0.8)'; floater.style.opacity = '0';
            document.body.appendChild(floater);
            void floater.offsetWidth; 
            floater.style.transform = 'translateY(-50px) scale(1.3)'; floater.style.opacity = '1';
            balWrapper.style.transform = 'scale(1.15)'; balWrapper.style.color = '#1CDA3A';
            setTimeout(() => { floater.style.opacity = '0'; }, 1000);
            setTimeout(() => { floater.remove(); balEl.innerText = parseFloat(newTotal).toFixed(2); balWrapper.style.transform = 'scale(1)'; balWrapper.style.color = ''; }, 1500);
        }

        let localState = "WAITING"; let hasBet = false;
        const reel = document.getElementById('slot-reel');
        let reelHTML = ''; for(let i=0; i<30; i++) { reelHTML += `<div class="slot-num">${i%10}</div>`; }
        reel.innerHTML = reelHTML;

        function setStake(val) { initAudio(); Sound.tick(); if(!hasBet && localState === "WAITING") document.getElementById('stake-amount').value = val; }
        function adjustStake(amt) { initAudio(); Sound.tick(); if(hasBet || localState !== "WAITING") return; let val = parseInt(document.getElementById('stake-amount').value) || 0; document.getElementById('stake-amount').value = Math.max(10, val + amt); }

        function renderHistory(hist) {
            const strip = document.getElementById('history-strip'); strip.innerHTML = '';
            hist.forEach(r => {
                let bg = r.col === "Green" ? "bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]" : r.col === "Red" ? "bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]" : "bg-purple-500 shadow-[0_0_8px_rgba(168,85,247,0.6)]";
                strip.innerHTML += `<div class="w-6 h-6 flex-shrink-0 flex items-center justify-center rounded-full text-white ${bg} text-[10px]">${r.num}</div>`;
            });
        }

        function disableButtons(disable) { document.querySelectorAll('.betting-btn').forEach(btn => { btn.style.opacity = disable ? '0.5' : '1'; btn.disabled = disable; }); }

        async function placeBet(target) {
            initAudio();
            if(localState !== "WAITING" || hasBet) return;
            let stake = parseFloat(document.getElementById('stake-amount').value);
            if(isNaN(stake) || stake < 10) { showToast('Minimum bet is ₹10', 'error'); return; }
            disableButtons(true);
            try {
                // BULLETPROOF NETWORK FETCH
                const payload = {
                    stake: Number(stake), 
                    target: String(target)
                };
                
                let res = await fetch("/color_prediction/bet", { 
                    method: "POST", 
                    headers: { 
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    }, 
                    body: JSON.stringify(payload) 
                }); 
                
                if(!res.ok) throw new Error("Server crashed or busy. Try again.");
                let data;
                try { data = await res.json(); } catch(e) { throw new Error("Backend did not return valid JSON."); }
                
                if(data.success) { document.getElementById('display-balance').innerText = data.new_total.toFixed(2); hasBet = true; document.getElementById('my-bet-info').classList.remove('hidden'); document.getElementById('my-bet-amt').innerText = stake; document.getElementById('my-bet-target').innerText = target; showToast(`Bet accepted on ${target}`, "success"); } 
                else { showToast(data.error || "Action failed", "error"); disableButtons(false); }
            } catch(e) { console.error(e); showToast(e.message || "Network Error - Connection Lost", "error"); disableButtons(false); }
        }

        async function syncLoop() {
            try {
                let res = await fetch('/color_prediction/sync'); let data = await res.json(); renderHistory(data.history);

                if (data.state !== localState) {
                    localState = data.state;
                    if (localState === "WAITING") {
                        hasBet = false; reel.style.transition = 'none'; reel.style.transform = `translateY(0px)`;
                        document.body.className = "bg-bgDark text-white min-h-[100dvh] flex flex-col pb-16 transition-colors duration-300";
                        document.getElementById('winner-color-text').style.opacity = '0'; document.getElementById('my-bet-info').classList.add('hidden');
                        reel.innerHTML = `<div class="slot-num text-gray-700">?</div>` + reelHTML;
                        disableButtons(false);
                    } 
                    else if (localState === "REVEAL") {
                        disableButtons(true); document.getElementById('status-label').innerText = "RESULT";
                        document.getElementById('timer-text').innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`; document.getElementById('timer-text').className = "text-3xl font-black text-gray-400";
                        const targetIndex = 20 + data.result_number; const offset = -(targetIndex * 120); 
                        reel.innerHTML = reelHTML; void reel.offsetWidth; 
                        reel.style.transition = 'transform 3s cubic-bezier(0.1, 0.8, 0.2, 1)'; reel.style.transform = `translateY(${offset}px)`;
                        
                        let rollTick = setInterval(() => { Sound.tick(); }, 150);
                        setTimeout(() => { clearInterval(rollTick); }, 2800);

                        setTimeout(() => {
                            let wText = document.getElementById('winner-color-text'); wText.innerText = `${data.result_number} • ${data.result_color} WINS!`; wText.style.opacity = '1';
                            if (data.result_color === "Green") { document.body.classList.add('win-bg-Green'); wText.className = "absolute bottom-4 text-2xl font-black tracking-widest uppercase text-green-500 drop-shadow-[0_0_10px_rgba(34,197,94,0.8)]"; } 
                            else if (data.result_color === "Red") { document.body.classList.add('win-bg-Red'); wText.className = "absolute bottom-4 text-2xl font-black tracking-widest uppercase text-red-500 drop-shadow-[0_0_10px_rgba(239,68,68,0.8)]"; } 
                            else { document.body.classList.add('win-bg-Violet'); wText.className = "absolute bottom-4 text-2xl font-black tracking-widest uppercase text-purple-500 drop-shadow-[0_0_10px_rgba(168,85,247,0.8)]"; }
                            
                            if(hasBet) { 
                                // Fetch final balance to eliminate double sounds
                                fetch('/color_prediction').then(r => r.text()).then(html => {
                                    const match = html.match(/id="display-balance">([\d.]+)<\/span>/);
                                    if(match && match[1]) {
                                        let newBal = parseFloat(match[1]); 
                                        let oldBal = parseFloat(document.getElementById('display-balance').innerText);
                                        if (newBal > oldBal) { 
                                            // THIS TRIGGERS THE 1 WIN SOUND
                                            triggerWinAnimation(newBal - oldBal, newBal); 
                                        } else { 
                                            // THIS TRIGGERS THE 1 LOSE SOUND
                                            Sound.lose();
                                            document.getElementById('display-balance').innerText = newBal.toFixed(2); 
                                        }
                                    }
                                });
                            }
                        }, 3200);
                    }
                }

                if (localState === "WAITING") {
                    let rem = Math.max(0, 30.0 - data.elapsed); let displayRem = Math.ceil(rem); let pad = displayRem < 10 ? '0' : '';
                    document.getElementById('status-label').innerText = "Place Your Bets"; document.getElementById('timer-text').innerText = `00:${pad}${displayRem}`;
                    if (rem < 5) { document.getElementById('timer-text').className = "text-3xl font-black text-red-500 animate-pulse drop-shadow-[0_0_10px_rgba(239,68,68,0.8)]"; } 
                    else { document.getElementById('timer-text').className = "text-3xl font-black text-brand drop-shadow-[0_0_10px_rgba(28,218,58,0.8)]"; }
                }
            } catch(e) {}
        } setInterval(syncLoop, 1000); syncLoop();
    </script>
</body>
</html>
